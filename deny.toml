# cargo-deny 設定
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]

# ── セキュリティアドバイザリ ────────────────────────────────────────────
[advisories]
# 既知の脆弱性を deny に設定
ignore = [
    # indicatif の間接依存。メンテナンス終了の通知のみでセキュリティ脆弱性ではない。
    # indicatif が unit-prefix に移行するまで抑制。
    { id = "RUSTSEC-2025-0119", reason = "number_prefix is pulled by indicatif; no security impact, only unmaintained notice" },
]

# ── ライセンスチェック ──────────────────────────────────────────────────
[licenses]
# 許可するライセンス（依存クレートで実際に使用されているもの）
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "0BSD",
    "CC0-1.0",
    "MIT-0",
    "Zlib",
    "Unlicense",
]
confidence-threshold = 0.8

[licenses.private]
# ワークスペース内の未公開クレートはライセンスチェック対象外
ignore = true

# ── 禁止クレート／重複バージョン ────────────────────────────────────────
[bans]
# 同一クレートの複数バージョンは警告（エラーにはしない）
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"

# ── ソース制限 ──────────────────────────────────────────────────────────
[sources]
# crates.io 以外のレジストリは警告
unknown-registry = "warn"
# git 依存は警告
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
